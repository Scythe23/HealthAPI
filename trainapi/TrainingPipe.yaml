apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: sap-ai-core-poc-training
  annotations:
    scenarios.ai.sap.com/description: "POC Training Pipeline"
    scenarios.ai.sap.com/name: "sap-ai-core-poc"
    executables.ai.sap.com/description: "Train the POC model"
    executables.ai.sap.com/name: "poc-training"
  labels:
    scenarios.ai.sap.com/id: "sap-ai-core-poc"
    ai.sap.com/version: "1.0.0"
spec:
  entrypoint: training-pipeline
  arguments:
    parameters:
      - name: raw-data-path
        value: "/app/data/raw"
      - name: processed-data-path
        value: "/app/data/processed"
      - name: model-output-path
        value: "/app/models"
  templates:
    - name: training-pipeline
      steps:
        - - name: preprocess
            template: preprocess-step
        - - name: train
            template: train-step

    - name: preprocess-step
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        # ── No imagePullSecrets - public image ────────────────────────────────
        image: docker.io/your-dockerhub-username/sap-ai-core-poc:latest
        command: ["python", "src/training/preprocess.py"]
        env:
          - name: RAW_DATA_PATH
            value: "{{workflow.parameters.raw-data-path}}"
          - name: PROCESSED_DATA_PATH
            value: "{{workflow.parameters.processed-data-path}}"
        volumeMounts:
          - name: input-data
            mountPath: /app/data/raw
          - name: processed-data
            mountPath: /app/data/processed
      inputs:
        artifacts:
          - name: input-data
            path: /app/data/raw
      outputs:
        artifacts:
          - name: processed-data
            path: /app/data/processed

    - name: train-step
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        # ── No imagePullSecrets - public image ────────────────────────────────
        image: docker.io/your-dockerhub-username/sap-ai-core-poc:latest
        command: ["python", "src/training/train.py"]
        env:
          - name: PROCESSED_DATA_PATH
            value: "{{workflow.parameters.processed-data-path}}"
          - name: MODEL_OUTPUT_PATH
            value: "{{workflow.parameters.model-output-path}}"
        volumeMounts:
          - name: processed-data
            mountPath: /app/data/processed
          - name: model-output
            mountPath: /app/models
      inputs:
        artifacts:
          - name: processed-data
            path: /app/data/processed
      outputs:
        artifacts:
          - name: model-output
            globalName: trainedmodels
            path: /app/models
            archive:
              none: {}
