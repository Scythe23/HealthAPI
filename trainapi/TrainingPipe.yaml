apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: sap-ai-core-poc-training
  annotations:
    scenarios.ai.sap.com/description: "POC Training Pipeline"
    scenarios.ai.sap.com/name: "sap-ai-core-poc"
    executables.ai.sap.com/description: "Train the POC model"
    executables.ai.sap.com/name: "poc-training"
  labels:
    scenarios.ai.sap.com/id: "sap-ai-core-poc"
    ai.sap.com/version: "1.0.0"
spec:
  entrypoint: training-pipeline
  templates:
    - name: training-pipeline
      steps:
        - - name: preprocess
            template: preprocess-step
        - - name: train
            template: train-step
    
    - name: preprocess-step
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        image: docker.io/rahulcruze786/training-service:v1.2
        command: [python, src/preprocess.py]
        env:
          - name: DATA_PATH
            value: "/app/data"
        volumeMounts:
          - name: input-data
            mountPath: /app/data
          - name: processed-data
            mountPath: /app/processed
      inputs:
        artifacts:
          - name: input-data
            path: /app/data
      outputs:
        artifacts:
          - name: processed-data
            path: /app/processed

    - name: train-step
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        image: docker.io/rahulcruze786/training-service:v1.2
        command: [python, src/training/train.py]
        env:
          - name: MODEL_OUTPUT_PATH
            value: "/app/model"
        volumeMounts:
          - name: processed-data
            mountPath: /app/processed
          - name: model-output
            mountPath: /app/model
      inputs:
        artifacts:
          - name: processed-data
            path: /app/processed
      outputs:
        artifacts:
          - name: model-output
            globalName: trainedmodels
            path: /app/model
            archive:
              none: {}
